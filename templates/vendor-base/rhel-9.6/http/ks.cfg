# RHEL 9.6 BIOS Kickstart
text
reboot
keyboard --vckeymap=us --xlayouts='us'
lang en_US.UTF-8
timezone UTC --utc
network --bootproto=dhcp --device=eth0 --noipv6 --hostname=localhost
rootpw vagrant
# Vagrant user
user --name=vagrant --plaintext --password=vagrant --groups=wheel

# Security
authselect select minimal --force
selinux --permissive
firewall --disabled

# Bootloader (BIOS/MBR)
bootloader --timeout=0 --location=mbr \
  --append="console=tty0 console=ttyS0,115200n8 no_timer_check net.ifnames=0 biosdevname=0"

# Partitioning
clearpart --all --initlabel --drives=vda
part /boot --fstype=xfs  --size=1024 --ondisk=vda
part /     --fstype=xfs  --grow       --ondisk=vda

%packages
@core
openssh-server
openssh-clients
sudo
curl
wget
bzip2
tar
which
net-tools
%end

%post
# passwordless sudo
echo 'vagrant ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/vagrant
chmod 440 /etc/sudoers.d/vagrant

# Ensure sshd starts
systemctl enable sshd

# Vagrant insecure key
mkdir -pm 700 /home/vagrant/.ssh
curl --insecure --location \
  https://raw.githubusercontent.com/mitchellh/vagrant/master/keys/vagrant.pub \
  > /home/vagrant/.ssh/authorized_keys
chown -R vagrant:vagrant /home/vagrant/.ssh
chmod 600 /home/vagrant/.ssh/authorized_keys
%end
