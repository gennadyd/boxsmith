#version=RHEL9
# UEFI kickstart for RHEL 9.x Vagrant base box
lang en_US.UTF-8
keyboard us
network --bootproto=dhcp --noipv6 --onboot=on --activate
rootpw --plaintext vagrant
firewall --enabled --ssh
selinux --enforcing
timezone UTC

# UEFI bootloader — no --location, uses EFI
bootloader --timeout=0 --append="console=tty0 console=ttyS0,115200n8 no_timer_check net.ifnames=0 biosdevname=0"

skipx
zerombr
clearpart --all --initlabel

# UEFI partition layout
part /boot/efi --fstype=efi      --size=512  --ondisk=vda
part /boot     --fstype=xfs      --size=1024 --ondisk=vda
part /         --fstype=xfs      --grow       --ondisk=vda

firstboot --disabled
reboot --eject

user --name=vagrant --plaintext --password vagrant
services --enabled=sshd

%addon com_redhat_kdump --disable
%end

%packages --ignoremissing --excludedocs
@^minimal-environment
# UEFI firmware tools
grub2-efi-x64
grub2-efi-x64-modules
shim-x64
efibootmgr
# Vagrant essentials
openssh-clients
sudo
wget
nfs-utils
net-tools
tar
bzip2
rsync
dnf-utils
# Remove unnecessary
-fprintd-pam
-intltool
-*firmware
-microcode_ctl
-plymouth
-plymouth-core-libs
-mcelog
-smartmontools
-usbutils
%end

%post
# sudo
echo 'Defaults:vagrant !requiretty' > /etc/sudoers.d/vagrant
echo '%vagrant ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers.d/vagrant
chmod 440 /etc/sudoers.d/vagrant

# eth0 via NetworkManager
nmcli connection modify "$(nmcli -t -f NAME conn show | head -1)" connection.id eth0 || true
cat > /etc/NetworkManager/conf.d/99-vagrant.conf << 'EOT'
[keyfile]
unmanaged-devices=*;except:interface-name:eth0
EOT
%end
