---
- name: Install kernel packages OpenCloudOs
  ansible.builtin.dnf:
    name: "{{ my_item }}"
    state: present
    use_backend: dnf
    disable_gpg_check: yes
  loop: "{{ kernel_packages }}"
  loop_control:
    loop_var: my_item
  vars:

- name: Update grub
  shell: grubby --set-default-index=0 && grubby --update-kernel=`/sbin/grubby --default-kernel` reboot --args="biosdevname=0 net.ifnames=0 "