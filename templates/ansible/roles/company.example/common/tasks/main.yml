---

- name: Import distribution specific variables
  include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_distribution | lower }}-{{ ansible_distribution_version | lower }}.yml"
    - "{{ ansible_os_family | lower }}-{{ ansible_distribution_version | lower }}.yml"
    - "{{ ansible_distribution | lower }}.yml"
    - blank.yml

- name: Install common packages
  package:
    name: "{{ item }}"
    state: latest
  loop: "{{ common_packages }}"
  when: ansible_distribution | lower not in ['tencentos', 'alibaba','centos']

- name: Install common packages on CentOS with GPG check disabled
  yum:
    name: "{{ item }}"
    state: latest
    disable_gpg_check: yes
  loop: "{{ common_packages }}"
  when: ansible_distribution | lower == 'centos'

- name: Install common packages on TencentOS or Alibaba OS
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: latest
    use_backend: dnf
  loop: "{{ common_packages }}"
  when: ansible_distribution | lower in ['tencentos', 'alibaba','opencloudos']

- name: Install DEV packages
  package:
    name: "{{ item }}"
    state: latest
  loop: "{{ common_packages_dev }}"
  when: image_box_type == "dev"

- name: update pci ids
  shell: update-pciids
  ignore_errors: true

