name: Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  packer-validate:
    name: packer validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Packer
        run: |
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update -qq && sudo apt-get install -y packer

      - name: Install Packer plugins (qemu + vagrant + ansible)
        run: |
          packer plugins install github.com/hashicorp/qemu
          packer plugins install github.com/hashicorp/vagrant
          packer plugins install github.com/hashicorp/ansible

      - name: Validate all Packer templates
        env:
          ARTIFACTORY_URL: "https://artifactory.example.com/artifactory"
          ARTIFACTORY_VAGRANT_REPO: "vagrant-boxes-local"
          DNS_SERVERS: "8.8.8.8"
          DNS_SEARCH_DOMAINS: "example.com"
          PACKER_PLUGIN_PATH: "/home/runner/.config/packer/plugins"
        run: |
          set -e
          ERRORS=0

          # vendor-base: each OS dir contains its own packer.json with builders
          echo "=== Validating vendor-base templates ==="
          for os_dir in templates/vendor-base/*/; do
            os=$(basename "$os_dir")
            echo "  → vendor-base/${os}"
            packer validate \
              -var-file="templates/_common/packer.json" \
              -var "box_type=vendor-base" \
              -var "serial_log=/tmp/serial.log" \
              "${os_dir}packer.json" \
              || { echo "    FAILED: vendor-base/${os}"; ERRORS=$((ERRORS+1)); }
          done

          # org-base / org-golden: flat var-files, shared packer-template-<type>.json
          for type in org-base org-golden; do
            echo "=== Validating ${type} templates ==="
            template="templates/packer-template-${type}.json"
            for var_file in "templates/${type}/"*.json; do
              name=$(basename "$var_file")
              echo "  → ${type}/${name}"
              packer validate \
                -var-file="templates/_common/packer.json" \
                -var-file="${var_file}" \
                -var "box_type=${type}" \
                -var "source_path=/dev/null" \
                "${template}" \
                || { echo "    FAILED: ${type}/${name}"; ERRORS=$((ERRORS+1)); }
            done
          done

          [ "$ERRORS" -eq 0 ] || { echo ""; echo "$ERRORS template(s) failed validation"; exit 1; }
          echo "All templates valid ✓"

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          find . -name "*.sh" \
            -not -path "./.git/*" \
            -not -path "./.packer-cache/*" \
            | sort | xargs shellcheck --severity=warning

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint -d '{extends: relaxed, rules: {line-length: {max: 200}}}' \
            templates/ansible/
