name: Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  packer-validate:
    name: packer validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Packer
        run: |
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update -qq && sudo apt-get install -y packer

      - name: Install packer-plugin-qemu
        run: |
          PLUGIN_VERSION=1.1.0
          mkdir -p ~/.config/packer/plugins/github.com/hashicorp/qemu
          wget -q -O /tmp/packer-plugin-qemu.zip \
            "https://releases.hashicorp.com/packer-plugin-qemu/${PLUGIN_VERSION}/packer-plugin-qemu_${PLUGIN_VERSION}_linux_amd64.zip"
          unzip -o /tmp/packer-plugin-qemu.zip -d ~/.config/packer/plugins/github.com/hashicorp/qemu

      - name: Validate all Packer templates
        env:
          ARTIFACTORY_URL: "https://artifactory.example.com/artifactory"
          ARTIFACTORY_VAGRANT_REPO: "vagrant-boxes-local"
          DNS_SERVERS: "8.8.8.8"
          DNS_SEARCH_DOMAINS: "example.com"
        run: |
          set -e
          ERRORS=0

          validate_main() {
            local type=$1 os=$2 ver_file=$3
            local os_dir="templates/${type}/${os}"
            local common="${os_dir}/common.json"
            local specific="${os_dir}/${ver_file}"
            local template="templates/packer-template.json"
            if [ -f "templates/packer-template-${type}.json" ]; then
              template="templates/packer-template-${type}.json"
            fi
            echo "  → ${type}/${os}/${ver_file}"
            packer validate \
              -var-file="templates/_common/packer.json" \
              -var-file="${common}" \
              -var-file="${specific}" \
              -var "box_type=${type}" \
              "${template}" || { echo "    FAILED: ${type}/${os}/${ver_file}"; ERRORS=$((ERRORS+1)); }
          }

          echo "=== Validating ubuntu-iso templates ==="
          for f in templates/os/ubuntu-iso/*.json; do
            echo "  → $f"
            PACKER_PLUGIN_PATH=~/.config/packer/plugins packer validate "$f" \
              || { echo "    FAILED: $f"; ERRORS=$((ERRORS+1)); }
          done

          echo "=== Validating cd templates ==="
          for os_dir in templates/cd/*/; do
            os=$(basename "$os_dir")
            for f in "${os_dir}"*.json; do
              ver_file=$(basename "$f")
              [ "$ver_file" = "common.json" ] && continue
              validate_main cd "$os" "$ver_file"
            done
          done

          echo "=== Validating base templates ==="
          for os_dir in templates/base/*/; do
            os=$(basename "$os_dir")
            for f in "${os_dir}"*.json; do
              ver_file=$(basename "$f")
              [ "$ver_file" = "common.json" ] && continue
              validate_main base "$os" "$ver_file"
            done
          done

          echo "=== Validating dev templates ==="
          for os_dir in templates/dev/*/; do
            os=$(basename "$os_dir")
            for f in "${os_dir}"*.json; do
              ver_file=$(basename "$f")
              [ "$ver_file" = "common.json" ] && continue
              validate_main dev "$os" "$ver_file"
            done
          done

          [ "$ERRORS" -eq 0 ] || { echo ""; echo "$ERRORS template(s) failed validation"; exit 1; }
          echo "All templates valid ✓"

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          find . -name "*.sh" \
            -not -path "./.git/*" \
            -not -path "./.packer-cache/*" \
            | sort | xargs shellcheck --severity=warning

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint -d '{extends: relaxed, rules: {line-length: {max: 200}}}' \
            templates/ansible/
